name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish self-contained EXE
        run: |
          dotnet publish EllipsometrySolver.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:EnableCompressionInSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true
          mkdir bin\Release\net8.0-windows\win-x64\publish\outputs

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: EllipsometrySolver-win-x64
          path: bin/Release/net8.0-windows/win-x64/publish/
