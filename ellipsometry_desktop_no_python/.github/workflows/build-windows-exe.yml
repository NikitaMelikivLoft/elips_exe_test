name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          dir
          Get-ChildItem -Recurse -Filter *.csproj

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish self-contained EXE
        shell: pwsh
        run: |
          $project = Get-ChildItem -Recurse -Filter "EllipsometrySolver.csproj" | Select-Object -First 1

          if ($null -eq $project) {
            Write-Error "Файл EllipsometrySolver.csproj не найден в репозитории"
            exit 1
          }

          Write-Host "Найден проект: $($project.FullName)"

          dotnet publish $project.FullName `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:EnableCompressionInSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish

          New-Item -ItemType Directory -Force -Path publish/outputs

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: EllipsometrySolver-win-x64
          path: publish/
